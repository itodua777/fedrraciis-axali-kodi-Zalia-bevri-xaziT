    const MapView = ({ clubs, onSelectClub }) => {
      const mapRef = React.useRef(null);
      const mapInstanceRef = React.useRef(null);
      const markersRef = React.useRef([]);

      React.useEffect(() => {
        if (!mapRef.current) return;
        
        if (!mapInstanceRef.current) {
          mapInstanceRef.current = L.map(mapRef.current).setView([42.3154, 43.3569], 7);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 19
          }).addTo(mapInstanceRef.current);
        }

        const map = mapInstanceRef.current;

        markersRef.current.forEach(m => map.removeLayer(m));
        markersRef.current = [];

        clubs.forEach(club => {
          if (club.lat && club.lng) {
            const markerHtml = `<div style="background-color: #22D3EE; width: 15px; height: 15px; border-radius: 50%; box-shadow: 0 0 10px #22D3EE, 0 0 20px #22D3EE; border: 2px solid #fff;"></div>`;
            const customIcon = L.divIcon({
              html: markerHtml,
              className: 'custom-leaflet-icon',
              iconSize: [15, 15],
              iconAnchor: [7.5, 7.5]
            });
            const marker = L.marker([club.lat, club.lng], { icon: customIcon }).addTo(map);
            
            marker.bindTooltip(`\n              <div style="background: #121418; border: 1px solid #22D3EE; padding: 10px; border-radius: 8px; color: #fff;">\n                <h4 style="margin: 0 0 5px 0; color: #22D3EE;">${club.name}</h4>\n                <div style="font-size: 12px; color: rgba(255,255,255,0.7);">წევრები: ${club.members}</div>\n                <div style="font-size: 12px; color: rgba(255,255,255,0.7);">ხელმძღვანელი: ${club.managerName}</div>\n              </div>\n            `);

            marker.on('click', () => onSelectClub(club));

      const mapInstance = React.useRef(null);
      const markersRef = React.useRef([]);
      const [selectedWaypoint, setSelectedWaypoint] = React.useState(null);

      const updateMapSource = (waypoints) => {
        if (!mapInstance.current) return;
        const validCoords = waypoints
          .filter(wp => wp.lat !== '' && wp.lng !== '' && !isNaN(parseFloat(wp.lat)) && !isNaN(parseFloat(wp.lng)))
          .map(wp => [parseFloat(wp.lng), parseFloat(wp.lat)]);

        // Update Line
        const routeSource = mapInstance.current.getSource('route');
        if (routeSource) {
          routeSource.setData({
            'type': 'Feature',
            'properties': {},
            'geometry': {
              'type': 'LineString',
              'coordinates': validCoords.length > 1 ? validCoords : []
            }
          });
        }

        // Update Markers
        markersRef.current.forEach(m => m.remove());
        markersRef.current = [];

        waypoints.forEach((wp, index) => {
          if (wp.lat !== '' && wp.lng !== '' && !isNaN(parseFloat(wp.lat)) && !isNaN(parseFloat(wp.lng))) {
            const el = document.createElement('div');
            const isPeak = index === waypoints.length - 1 && waypoints.length > 1;
            el.innerHTML = isPeak 
              ? '<i class="fa-solid fa-flag" style="color: #ef4444; font-size: 24px; text-shadow: 0 0 10px #ef4444;"></i>'

            const marker = new mapboxgl.Marker(el)

                title: wp.label || `წერტილი ${index + 1}`,

            markersRef.current.push(marker);
          }
        });
      };

      React.useEffect(() => {
        if (!mapContainerRef.current) return;
        
        try {
          mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4M29iazA2Z2gycXA4N2pmbDZmangifQ.-g_vE53SD2WrJ6tFX7QHmA';
          
          const map = new mapboxgl.Map({

                'sky-atmosphere-sun-intensity': 15
              }
            });

            map.addSource('route', {
              'type': 'geojson',
              'data': {
                'type': 'Feature',
                'properties': {},
                'geometry': {
                  'type': 'LineString',
                  'coordinates': []
                }
              }
            });

            map.addLayer({
              'id': 'route-line',
              'type': 'line',
              'source': 'route',
              'layout': {
                'line-join': 'round',
                'line-cap': 'round'
              },
              'paint': {
                'line-color': '#22D3EE',
                'line-width': 4,
                'line-opacity': 0.8
              }
            });

            updateMapSource(formData.waypoints);
          });

          return () => map.remove();
        } catch(e) {

      }, []);

      React.useEffect(() => {
        if (mapInstance.current && mapInstance.current.isStyleLoaded()) {
          updateMapSource(formData.waypoints);
        }
      }, [formData.waypoints]);

      const handleSave = () => {
        if (isEditMode) {
          setRoutes(routes.map(r => r.id === editRouteId ? { ...formData, id: editRouteId, date: new Date().toISOString().split('T')[0] } : r));

          setRoutes([...routes, { ...formData, id: `route-${Date.now()}`, date: new Date().toISOString().split('T')[0] }]);

        handleCancel();
      };

      const handleCancel = () => {
        setFormData(emptyRoute);
        setIsEditMode(false);
        setEditRouteId(null);
      };

      const handleEdit = (route) => {
        setFormData(route);
        setIsEditMode(true);
        setEditRouteId(route.id);
        if (mapInstance.current && route.waypoints.length > 0) {
          const validCoords = route.waypoints.filter(wp => wp.lat !== '' && wp.lng !== '');
          if (validCoords.length > 0) {
            const firstValid = validCoords[0];
            mapInstance.current.flyTo({
              center: [parseFloat(firstValid.lng), parseFloat(firstValid.lat)],
              zoom: 12,
              essential: true
            });
          }
        }

    const PeaksDashboard = ({ athletes = [], onUpdateAthlete }) => {
      const { uiaaDictionary = {}, uiaaStyleMultipliers = {} } = useRatingSettingsStore();
      const uiaaOptions = Object.keys(uiaaDictionary);
      const styleOptions = Object.keys(uiaaStyleMultipliers);

      const [regAthleteId, setRegAthleteId] = React.useState('');
      const [regRoute, setRegRoute] = React.useState('');
      const [regYear, setRegYear] = React.useState(new Date().getFullYear());
      const [regDate, setRegDate] = React.useState('');
      const [regCategory, setRegCategory] = React.useState('');
      const [regStyle, setRegStyle] = React.useState('');
      const [regResultText, setRegResultText] = React.useState('');

      const handleClimbRegister = () => {
        if (!regAthleteId || !regYear || !regCategory || !regStyle) {
          alert("გთხოვთ შეავსოთ აუცილებელი ველები (სპორტსმენი, წელი, კატეგორია, სტილი)!");
          return;
        }

        const athlete = athletes.find(a => a.id === regAthleteId);
        if (!athlete) {
          alert("არჩეული სპორტსმენი ვერ მოიძებნა!");
          return;
        }

        const points = calculateRating(selectedPeak.height, regCategory, regStyle);
        const oldReferral = Number(athlete.referral || 0);
        const newReferral = oldReferral + points;

        const newActivity = {
          id: generateUUID(),
          year: parseInt(regYear),
          date: regDate || undefined,
          title: selectedPeak.name,
          peak: selectedPeak.name,
          route: regRoute || undefined,
          achievement: `${regResultText || 'წარმატებული ასვლა'} (+${points} რეიტინგი, სტილი: ${regStyle}, კატეგორია: ${regCategory})`,
          result: `${regResultText || 'წარმატებული ასვლა'} (+${points} რეიტინგი, სტილი: ${regStyle}, კატეგორია: ${regCategory})`,
          type: 'expedition'
        };

        const updatedAchievements = athlete.achievements ? [...athlete.achievements, newActivity] : [newActivity];
        const finalAchievements = checkAndApplyRankUp({ ...athlete, achievements: updatedAchievements }, oldReferral, newReferral);

        onUpdateAthlete({
          ...athlete,
          referral: newReferral,
          achievements: finalAchievements
        });

        alert(`ასვლა წარმატებით დარეგისტრირდა! სპორტსმენს დაერიცხა ${points} ქულა.`);
        
        // Reset form fields
        setRegAthleteId('');
        setRegRoute('');
        setRegYear(new Date().getFullYear());
        setRegDate('');
        setRegCategory('');
        setRegStyle('');
        setRegResultText('');
      };

      const [peaks, setPeaks] = React.useState(getPersistedPeaks());
      const [selectedPeak, setSelectedPeak] = React.useState(null);
      const [isAdding, setIsAdding] = React.useState(false);
      const [viewMode, setViewMode] = React.useState('map'); // 'map' or 'table'
      const [isMapFullscreen, setIsMapFullscreen] = React.useState(false);
      const [searchQuery, setSearchQuery] = React.useState('');
      const [systemFilter, setSystemFilter] = React.useState('');
      const [heightFilter, setHeightFilter] = React.useState('');
      const mapRef = React.useRef(null);
      const mapInstanceRef = React.useRef(null);
      const markersRef = React.useRef({});
      
      const [formData, setFormData] = React.useState({
        name: '', height: '', system: '', continent: '', region: '', difficulty: '',
        isBorderZone: false, borderCountries: [], lat: '', lng: '', firstAscent: '', description: '', photo: null
      });

      const availableSystems = ["კავკასიონი", "ჰიმალაი", "ალპები", "ანდები", "კორდილიერები", "პამირი", "ტიან-შანი"];
      const availableContinents = ["ევროპა", "აზია", "აფრიკა", "ჩრდ. ამერიკა", "სამხრ. ამერიკა", "ანტარქტიდა", "ოკეანეთი"];
      const availableDifficulties = ["1B", "2A", "2B", "3A", "3B", "4A", "4B", "5A", "5B", "6A", "6B"];
      const availableCountries = ["საქართველო", "რუსეთი", "თურქეთი", "სომხეთი", "აზერბაიჯანი", "ჩინეთი", "ნეპალი", "ინდოეთი"];

      // ESC key listener to exit fullscreen
      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            setIsMapFullscreen(false);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      // Invalidate Leaflet map size when fullscreen changes
      React.useEffect(() => {
        if (mapInstanceRef.current) {
          setTimeout(() => {
            mapInstanceRef.current.invalidateSize();
          }, 100);
        }
      }, [isMapFullscreen]);

      // Filtered Peaks computation
      const filteredPeaks = peaks.filter(p => {
        const nameMatch = p.name ? p.name.toLowerCase().includes(searchQuery.toLowerCase()) : false;
        const regionMatch = p.region ? p.region.toLowerCase().includes(searchQuery.toLowerCase()) : false;
        const difficultyMatch = p.difficulty ? p.difficulty.toLowerCase().includes(searchQuery.toLowerCase()) : false;
        const matchesSearch = searchQuery ? (nameMatch || regionMatch || difficultyMatch) : true;
        
        const matchesSystem = systemFilter ? p.system === systemFilter : true;
        
        let matchesHeight = true;
        if (heightFilter === 'high') {
          matchesHeight = Number(p.height) > 4000;
        } else if (heightFilter === 'medium') {
          matchesHeight = Number(p.height) >= 3000 && Number(p.height) <= 4000;
        } else if (heightFilter === 'low') {
          matchesHeight = Number(p.height) < 3000;
        }
        
        return matchesSearch && matchesSystem && matchesHeight;
      });

      React.useEffect(() => {
        if (viewMode === 'map' && mapRef.current && !mapInstanceRef.current && window.L) {
          mapInstanceRef.current = L.map(mapRef.current).setView([42.3154, 43.3569], 7);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
          }).addTo(mapInstanceRef.current);
        }
        
        if (mapInstanceRef.current && window.L) {
          Object.values(markersRef.current).forEach(m => m.remove());
          markersRef.current = {};
          
          filteredPeaks.forEach(peak => {
            if (peak.lat && peak.lng) {
              const color = peak.isBorderZone ? '#f59e0b' : '#22d3ee';
              const markerHtml = `<div style="width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid ${color}; filter: drop-shadow(0 0 5px ${color});"></div>`;
              const icon = L.divIcon({ html: markerHtml, className: 'custom-peak-icon', iconSize: [20, 20], iconAnchor: [10, 20] });
              const marker = L.marker([peak.lat, peak.lng], { icon }).addTo(mapInstanceRef.current);
              marker.bindPopup(`<b>${peak.name}</b><br/>${peak.height} მ`);
              marker.on('click', () => { setSelectedPeak(peak); setIsAdding(false); });
              markersRef.current[peak.id] = marker;
            }
          });
        }
      }, [viewMode, filteredPeaks]);

      React.useEffect(() => {
        if (selectedPeak && mapInstanceRef.current && selectedPeak.lat && selectedPeak.lng) {

        try { return JSON.parse(saved); } catch(e){}
      }
      return defaultSettings;

      state: getPersistedSettings(),
      listeners: new Set(),
      getState: function() { return this.state; },
      setState: function(newState) {
        this.state = { ...this.state, ...newState };
        localStorage.setItem('ratingSettings', JSON.stringify(this.state));
        this.listeners.forEach(l => l(this.state));
      },
      subscribe: function(listener) {
        this.listeners.add(listener);
        return () => this.listeners.delete(listener);
      }
    };

    const useRatingSettingsStore = () => {
      const [state, setState] = React.useState(ratingStoreData.getState());
      React.useEffect(() => {
        return ratingStoreData.subscribe(setState);
      }, []);
      return {
        ...state,
        ranksEnabled: state.ranksEnabled !== false,
        ratingCalculationEnabled: state.ratingCalculationEnabled !== false,
        updateUiaaPoint: (level, point) => {
          ratingStoreData.setState({ uiaaDictionary: { ...ratingStoreData.state.uiaaDictionary, [level]: point } });
        },
        updateStyleMultiplier: (style, multiplier) => {
          ratingStoreData.setState({ uiaaStyleMultipliers: { ...ratingStoreData.state.uiaaStyleMultipliers, [style]: multiplier } });
        },
        updateHeightDivisor: (divisor) => {
          ratingStoreData.setState({ heightDivisor: divisor });
        },
        addUiaaCategory: (level) => {
          ratingStoreData.setState({ uiaaDictionary: { ...ratingStoreData.state.uiaaDictionary, [level]: 0 } });
        },
        addStyle: (style) => {

        },
        toggleRanksEnabled: () => {
          ratingStoreData.setState({ ranksEnabled: ratingStoreData.state.ranksEnabled !== false ? false : true });
        },
        toggleRatingCalculationEnabled: () => {
          ratingStoreData.setState({ ratingCalculationEnabled: ratingStoreData.state.ratingCalculationEnabled !== false ? false : true });
        }
      };
    };

    useRatingSettingsStore.getState = () => ratingStoreData.getState();

    const calculateRating = (peakHeight, uiaaLevel, style) => {
      const { uiaaDictionary, uiaaStyleMultipliers, heightDivisor, ratingCalculationEnabled } = useRatingSettingsStore.getState();
      if (ratingCalculationEnabled === false) return 0;
      const basePoint = uiaaDictionary[uiaaLevel] ?? 0;
      const styleMultiplier = uiaaStyleMultipliers[style] ?? 1.0;
      const heightMultiplier = peakHeight / heightDivisor;
      const finalScore = basePoint * heightMultiplier * styleMultiplier;
      return Math.round(finalScore);
    };

const generateUUID = () => {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
};

const useRanksStore = () => {
  const [state, setState] = React.useState(ranksStoreData.getState());
  React.useEffect(() => {
    return ranksStoreData.subscribe(setState);
  }, []);
  return {
    ...state,
    addRank: () => ranksStoreData.setState({ ranks: [...ranksStoreData.state.ranks, { id: generateUUID(), name: '', requiredPoints: 0, status: 'აქტიური' }] }),
    updateRank: (id, field, value) => ranksStoreData.setState({ ranks: ranksStoreData.state.ranks.map(r => r.id === id ? { ...r, [field]: value } : r) }),
    removeRank: (id) => ranksStoreData.setState({ ranks: ranksStoreData.state.ranks.filter(r => r.id !== id) }),
    addHonoraryTitle: () => ranksStoreData.setState({ honoraryTitles: [...ranksStoreData.state.honoraryTitles, { id: generateUUID(), name: '', description: '', status: 'აქტიური' }] }),
    updateHonoraryTitle: (id, field, value) => ranksStoreData.setState({ honoraryTitles: ranksStoreData.state.honoraryTitles.map(t => t.id === id ? { ...t, [field]: value } : t) }),
    removeHonoraryTitle: (id) => ranksStoreData.setState({ honoraryTitles: ranksStoreData.state.honoraryTitles.filter(t => t.id !== id) })
  };
};
useRanksStore.getState = () => ranksStoreData.getState();

                <button onClick={() => { if(newCat) { store.addUiaaCategory(newCat); setNewCat(""); } }} style={{ backgroundColor: "rgba(34, 211, 238, 0.1)", border: "1px solid #22d3ee", color: "#22d3ee", padding: "8px 12px", borderRadius: "8px", cursor: "pointer" }}>+</button>
              </div>
            </div>

            {/* Card 2: Styles */}
            <div style={cardStyle}>
              <h3 style={{ color: "#22d3ee", margin: "0 0 10px 0", fontSize: "16px" }}><i className="fa-solid fa-person-snowboarding"></i> ასვლის სტილის კოეფიციენტი</h3>
              <div style={{ display: "flex", flexDirection: "column" }}>
                {Object.entries(store.uiaaStyleMultipliers).map(([style, mult]) => (
                  <div key={style} style={rowStyle}>
                    <span style={{ fontSize: "14px", fontWeight: "bold" }}>{style}</span>
                    <input type="number" step="0.1" style={{ ...inputStyle, width: "80px" }} value={mult} onChange={e => store.updateStyleMultiplier(style, parseFloat(e.target.value) || 0)} />
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: "10px", marginTop: "10px" }}>
                <input type="text" placeholder="ახალი სტილი" style={inputStyle} value={newStyle} onChange={e => setNewStyle(e.target.value)} />
                <button onClick={() => { if(newStyle) { store.addStyle(newStyle); setNewStyle(""); } }} style={{ backgroundColor: "rgba(34, 211, 238, 0.1)", border: "1px solid #22d3ee", color: "#22d3ee", padding: "8px 12px", borderRadius: "8px", cursor: "pointer" }}>+</button>
              </div>
            </div>

            {/* Card 3: Height Divisor */}
            <div style={cardStyle}>
              <h3 style={{ color: "#22d3ee", margin: "0 0 10px 0", fontSize: "16px" }}><i className="fa-solid fa-ruler-vertical"></i> სიმაღლის პარამეტრები</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                <label style={{ fontSize: "14px", color: "rgba(255,255,255,0.7)" }}>სიმაღლის გამყოფი კოეფიციენტი</label>
                <input type="number" style={inputStyle} value={store.heightDivisor} onChange={e => store.updateHeightDivisor(parseFloat(e.target.value) || 1)} />
                <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.4)" }}>
                  ეს რიცხვი განსაზღვრავს რეიტინგის სიმკაცრეს მთელ სისტემაში.
                </div>
              </div>
            </div>
          </div>

          {/* Simulator */}
          <div style={{ ...cardStyle, border: "1px solid #f59e0b", marginTop: "20px" }}>
            <h3 style={{ color: "#f59e0b", margin: "0 0 15px 0", fontSize: "18px", display: "flex", alignItems: "center", gap: "10px" }}>
              <i className="fa-solid fa-calculator"></i> სიმულატორი (Live Sandbox Testing)
            </h3>
            <div style={{ display: "flex", gap: "20px", alignItems: "center" }}>
              <div style={{ flex: 1 }}>
                <label style={{ display: "block", marginBottom: "8px", fontSize: "14px", color: "rgba(255,255,255,0.8)" }}>მწვერვალის სიმაღლე</label>
                <input type="number" style={inputStyle} value={simHeight} onChange={e => setSimHeight(parseFloat(e.target.value) || 0)} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={{ display: "block", marginBottom: "8px", fontSize: "14px", color: "rgba(255,255,255,0.8)" }}>სირთულე (UIAA)</label>
                <select style={inputStyle} value={simLevel} onChange={e => setSimLevel(e.target.value)}>
                  {Object.keys(store.uiaaDictionary).map(lvl => (
                    <option key={lvl} value={lvl}>{lvl} ({store.uiaaDictionary[lvl]})</option>
                  ))}
                </select>
              </div>
              <div style={{ flex: 1 }}>
                <label style={{ display: "block", marginBottom: "8px", fontSize: "14px", color: "rgba(255,255,255,0.8)" }}>სტილი</label>
                <select style={inputStyle} value={simStyle} onChange={e => setSimStyle(e.target.value)}>
                  {Object.keys(store.uiaaStyleMultipliers).map(s => (
                    <option key={s} value={s}>{s} ({store.uiaaStyleMultipliers[s]})</option>
                  ))}
                </select>
              </div>
            </div>
            
            <div style={{ backgroundColor: "rgba(245, 158, 11, 0.1)", border: "1px dashed #f59e0b", borderRadius: "8px", padding: "20px", marginTop: "20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: "16px", color: "#f59e0b", fontWeight: "bold" }}>⚡ რეალური დროის სატესტო შედეგი:</span>
              <span style={{ fontSize: "32px", color: "#fff", fontWeight: "bold", textShadow: "0 0 10px rgba(245, 158, 11, 0.5)" }}>{simScore} ქულა</span>
            </div>
          </div>
        </>
      )}

      {activeTab === 'ranks' && (
        <>
          <div style={toggleContainerStyle}>
            <span style={switchLabelStyle}>თანრიგთა მინიჭების სისტემა ჩართულია:</span>
            <div style={switchOuterStyle(store.ranksEnabled)} onClick={store.toggleRanksEnabled}>
              <div style={switchInnerStyle(store.ranksEnabled)}></div>
            </div>
          </div>
          <div style={{ ...cardStyle, marginBottom: "20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
              <h3 style={{ margin: 0, color: "#fff", display: "flex", alignItems: "center", gap: "10px" }}>
                🥇 ძირითადი სპორტული თანრიგები
              </h3>
              <button style={actionButtonStyle} onClick={ranksStore.addRank}>
                + ახალი თანრიგის დამატება
              </button>
            </div>
            
            <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
              {ranksStore.ranks.map(rank => (
                <div key={rank.id} style={listCardStyle}>
                  <div style={fieldGroupStyle}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>თანრიგის დასახელება</label>
                    <input type="text" style={inputStyle} value={rank.name} placeholder="თანრიგის დასახელება (მაგ. II თანრიგი)" onChange={(e) => ranksStore.updateRank(rank.id, 'name', e.target.value)} />
                  </div>
                  <div style={fieldGroupStyle}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>საჭირო ქულები / კრიტერიუმი</label>
                    <input type="number" style={inputStyle} value={rank.requiredPoints} placeholder="საჭირო ქულები / კრიტერიუმი" onChange={(e) => ranksStore.updateRank(rank.id, 'requiredPoints', parseFloat(e.target.value) || 0)} />
                  </div>
                  <div style={{ ...fieldGroupStyle, flex: 0.5 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>სტატუსი</label>
                    <select style={inputStyle} value={rank.status} onChange={(e) => ranksStore.updateRank(rank.id, 'status', e.target.value)}>
                      <option value="აქტიური">აქტიური</option>
                      <option value="არააქტიური">არააქტიური</option>
                    </select>
                  </div>
                  <button 
                    onClick={() => ranksStore.removeRank(rank.id)}
                    style={{ backgroundColor: "rgba(239, 68, 68, 0.1)", border: "1px solid rgba(239, 68, 68, 0.3)", color: "#ef4444", width: "40px", height: "40px", borderRadius: "8px", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all 0.3s" }}
                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = "rgba(239, 68, 68, 0.2)"}
                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = "rgba(239, 68, 68, 0.1)"}
                  >
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>

          <div style={cardStyle}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
              <h3 style={{ margin: 0, color: "#fff", display: "flex", alignItems: "center", gap: "10px" }}>
                🎖️ საპატიო და ვეტერანთა წოდებები
              </h3>
              <button style={actionButtonStyle} onClick={ranksStore.addHonoraryTitle}>
                + ახალი წოდების დამატება
              </button>
            </div>
            
            <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
              {ranksStore.honoraryTitles.map(title => (
                <div key={title.id} style={listCardStyle}>
                  <div style={fieldGroupStyle}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>წოდება</label>
                    <input type="text" style={inputStyle} value={title.name} placeholder="წოდება (მაგ. თოვლის ჯიქი)" onChange={(e) => ranksStore.updateHonoraryTitle(title.id, 'name', e.target.value)} />
                  </div>
                  <div style={{ ...fieldGroupStyle, flex: 2 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>აღწერა / კრიტერიუმი</label>
                    <input type="text" style={inputStyle} value={title.description} placeholder="აღწერა / კრიტერიუმი" onChange={(e) => ranksStore.updateHonoraryTitle(title.id, 'description', e.target.value)} />
                  </div>
                  <div style={{ ...fieldGroupStyle, flex: 0.5 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)" }}>სტატუსი</label>
                    <select style={inputStyle} value={title.status} onChange={(e) => ranksStore.updateHonoraryTitle(title.id, 'status', e.target.value)}>
                      <option value="აქტიური">აქტიური</option>
                      <option value="არააქტიური">არააქტიური</option>
                    </select>
                  </div>
                  <button 
                    onClick={() => ranksStore.removeHonoraryTitle(title.id)}
                    style={{ backgroundColor: "rgba(239, 68, 68, 0.1)", border: "1px solid rgba(239, 68, 68, 0.3)", color: "#ef4444", width: "40px", height: "40px", borderRadius: "8px", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", transition: "all 0.3s" }}
                    onMouseOver={(e) => e.currentTarget.style.backgroundColor = "rgba(239, 68, 68, 0.2)"}
                    onMouseOut={(e) => e.currentTarget.style.backgroundColor = "rgba(239, 68, 68, 0.1)"}
                  >
                    <i className="fa-solid fa-xmark"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {activeTab === 'awards' && (
        <div style={cardStyle}>
          <p style={{ color: "rgba(255,255,255,0.5)", textAlign: "center", padding: "20px 0" }}>ჯილდოების სისტემა მუშავდება...</p>
        </div>
      )}

    </div>
  );
};


    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = React.useState(false);
      const [selectedFederation, setSelectedFederation] = React.useState("");
      const [currentView, setCurrentView] = React.useState("dashboard");
      const [athletes, setAthletes] = React.useState(MOCK_ATHLETES);
      const [clubs, setClubs] = React.useState([
        { id: 1, name: "მთამსვლელთა კლუბი 'თეთნულდი'", status: "ააიპ", regNo: "400123456", date: "2015-05-10", members: 120, region: "სამეგრელო-ზემო სვანეთი", lat: 43.0333, lng: 42.7333, managerName: "ზურაბ მარგიანი", managerId: "01010101010", managerPhone: "+995555123456", managerEmail: "zurab@example.com" },
        { id: 2, name: "თბილისის სათავგადასავლო კლუბი", status: "შპს", regNo: "200987654", date: "2018-08-20", members: 350, region: "თბილისი", lat: 41.7151, lng: 44.8271, managerName: "გიორგი ნემსაძე", managerId: "01010101011", managerPhone: "+995555654321", managerEmail: "giorgi@example.com" },
        { id: 3, name: "თბილისის ალპური კლუბი", status: "ააიპ", regNo: "401928374", date: "2012-03-15", members: 95, region: "თბილისი", lat: 41.7151, lng: 44.8271, managerName: "ლევან კოხრეიძე", managerId: "01020304051", managerPhone: "+995555456789", managerEmail: "levan@example.com" }
      ]);
      const [selectedClubId, setSelectedClubId] = React.useState(null);

      const handleClubClick = (clubId) => {
        setSelectedClubId(clubId);
        setCurrentView("clubs");
      };

      const [incidents, setIncidents] = React.useState([
        // Mock a high severity incident to show alert
        { id: "1", athleteId: "860642", date: "2026-05-15", time: "10:30", location: "ცენტრალური მოედანი", severity: "მაღალი", description: "მძიმე ტრავმა", status: "მიმდინარე", attachments: [] }
      ]);

      const handleLogin = (federation) => {
        setIsAuthenticated(true);
        setSelectedFederation(federation);
      };

      const handleAddAthlete = (newAthlete) => {
        setAthletes([...athletes, newAthlete]);
      };

      const handleUpdateAthlete = (updatedAthlete) => {
        setAthletes(prev => prev.map(a => a.id === updatedAthlete.id ? updatedAthlete : a));
      };

      const handleAddIncident = (newIncident) => {
        setIncidents([...incidents, { ...newIncident, id: String(Date.now()) }]);
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setSelectedFederation("");
      };

      if (!isAuthenticated) {
        return <Login onLogin={handleLogin} />;
      }

      return (
        <div style={{ display: "flex", height: "100vh", backgroundColor: "#121418", overflow: "hidden" }}>
          <Sidebar currentView={currentView} onViewChange={setCurrentView} federation={selectedFederation} />
          <div style={{ display: "flex", flexDirection: "column", flex: 1 }}>
            <Header federation={selectedFederation} onLogout={handleLogout} />
            {currentView === 'dashboard' && <MainView incidents={incidents} />}
            {currentView === 'athletes' && <AthletesLibrary onViewChange={setCurrentView} athletes={athletes} onUpdateAthlete={handleUpdateAthlete} clubs={clubs} onClubClick={handleClubClick} />}
            {currentView === 'add_athlete' && <AddAthleteForm onViewChange={setCurrentView} federation={selectedFederation} onAdd={handleAddAthlete} clubs={clubs} />}
            {currentView === 'incidents' && <IncidentsDashboard onViewChange={setCurrentView} incidents={incidents} athletes={athletes} />}
            {currentView === 'add_incident' && <AddIncidentForm onViewChange={setCurrentView} onAdd={handleAddIncident} athletes={athletes} />}
            {currentView === 'warehouse' && <WarehouseDashboard athletes={athletes} onUpdateAthlete={handleUpdateAthlete} />}
            {currentView === 'medianews' && <MediaNewsDashboard />}
            {currentView === 'partnerships' && <PartnershipsDashboard />}
            {currentView === 'management' && <ManagementDashboard athletes={athletes} />}
            {currentView === 'memorial' && <MemorialRegistryDashboard athletes={athletes} onUpdateAthlete={handleUpdateAthlete} />}
            {currentView === 'mentors' && <MentorsDashboard onViewChange={setCurrentView} athletes={athletes} />}
            {currentView === 'add_mentor' && <AddMentorForm onViewChange={setCurrentView} />}
            {currentView === 'clubs' && <ClubsRegistryDashboard clubs={clubs} setClubs={setClubs} selectedClubId={selectedClubId} setSelectedClubId={setSelectedClubId} />}
            {currentView === 'spaces' && <TrainingSpacesDashboard />}
            {currentView === 'routes' && <RoutePlanningDashboard />}
            {currentView === 'peaks' && <PeaksDashboard athletes={athletes} onUpdateAthlete={handleUpdateAthlete} />}
            {currentView === 'settings' && <SettingsDashboard />}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
