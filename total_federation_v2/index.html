<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Federation</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Import Map for bare specifier resolution -->
  <script type="importmap">
    {
      "imports": {
        "react": "./src/utils/react-shim.js",
        "react-dom": "./src/utils/react-dom-shim.js"
      }
    }
  </script>

  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

  <style>
    :root {
      /* Tempered Iron // ნაწვრთობი რკინა (ბაზისი) */
      --color-iron: #121418;
      --color-iron-surface: #1A1D23;
      --color-iron-border: #232730;

      /* Silver Structure // ძველი ვერცხლი (სტრუქტურა) */
      --color-silver-structure: #9CA3AF;

      /* Emerald Core // ზურმუხტისფერი ბირთვი (აქტივაცია და ენერგია) */
      --color-emerald-core: #00E676;

      /* Active Node Elements // კვანძების აქტიური ფერები */
      --color-sapphire: #0F52BA;
      --color-copper: #D97736;
      --color-gold-raw: #D4AF37;
      --color-bone-light: #F5F5F7;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-iron);
      color: var(--color-bone-light);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .print-only {
      display: none;
    }
    .athlete-print-doc, .bulk-print-doc {
      display: none;
    }
    @media print {
      #root {
        display: none !important;
      }
      body {
        background-color: white !important;
        color: black !important;
      }
      body.printing-bulk .athlete-print-doc {
        display: none !important;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .memorial-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 20px !important;
        font-family: serif;
      }
      .memorial-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #000 !important;
        background: none !important;
      }
      .memorial-print-title {
        font-size: 24px !important;
        font-weight: bold !important;
        margin-bottom: 20px !important;
        text-align: center !important;
      }
      .memorial-print-badge {
        border: 1px solid black !important;
        padding: 4px 8px !important;
        display: inline-block !important;
        margin: 4px !important;
        border-radius: 16px !important;
        font-size: 14px !important;
      }
      .athlete-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .athlete-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
      .print-header {
        border-bottom: 3px double #000;
        padding-bottom: 12px;
        margin-bottom: 24px;
        text-align: center;
      }
      .print-header h1 {
        font-size: 20px;
        margin: 0;
        text-transform: uppercase;
        font-weight: bold;
      }
      .print-header p {
        font-size: 14px;
        margin: 4px 0 0 0;
        color: #555;
      }
      .print-section {
        margin-bottom: 20px;
      }
      .print-section-title {
        font-size: 14px;
        font-weight: bold;
        border-bottom: 1px solid #000;
        padding-bottom: 4px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .print-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .print-field {
        font-size: 13px;
        line-height: 1.4;
      }
      .print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      .print-table th, .print-table td {
        border: 1px solid #000;
        padding: 8px;
        font-size: 12px;
        text-align: left;
      }
      .print-table th {
        background-color: #f2f2f2 !important;
        font-weight: bold;
      }
      .print-bio-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        align-items: center;
      }
      .print-avatar {
        width: 80px;
        height: 80px;
        border: 1px solid #000;
        object-fit: cover;
      }
      .bulk-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .bulk-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
      .bulk-print-header {
        border-bottom: 3px double #000;
        padding-bottom: 12px;
        margin-bottom: 24px;
        text-align: center;
      }
      .bulk-print-header h1 {
        font-size: 18px;
        margin: 0;
        text-transform: uppercase;
        font-weight: bold;
        line-height: 1.4;
      }
      .bulk-print-header p {
        font-size: 12px;
        margin: 4px 0 0 0;
        color: #555;
      }
      .bulk-print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      .bulk-print-table th, .bulk-print-table td {
        border: 1px solid #000 !important;
        padding: 6px 8px;
        font-size: 11px;
        text-align: left;
      }
      .bulk-print-table th {
        background-color: #f2f2f2 !important;
        font-weight: bold;
      }
    }
    .warehouse-print-doc {
      display: none;
    }
    @media print {
      .warehouse-print-doc {
        display: block !important;
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .warehouse-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
        max-height: 0;
        overflow: hidden;
      }
      to {
        opacity: 1;
        transform: translateY(0);
        max-height: 1000px;
      }
    }
    .animate-slide-down {
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .profile-dual-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (min-width: 1024px) {
      .profile-dual-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .sidebar-toggle-btn {
      position: absolute;
      top: 24px;
      right: -12px;
      z-index: 100;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: var(--color-iron);
      border: 1px solid color-mix(in oklab, var(--color-emerald-core) 40%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-emerald-core);
      box-shadow: 0 0 8px color-mix(in oklab, var(--color-emerald-core) 20%, transparent);
      transition: all 0.2s ease-in-out;
      outline: none;
    }
    .sidebar-toggle-btn:hover {
      border-color: var(--color-emerald-core);
      box-shadow: 0 0 12px color-mix(in oklab, var(--color-emerald-core) 60%, transparent);
      transform: scale(1.1);
    }
    .is-fullscreen-map .leaflet-top.leaflet-left {
      top: auto !important;
      bottom: 20px !important;
      left: auto !important;
      right: 20px !important;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module" src="./src/App.jsx"></script>
</body>
</html>
