<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Total Federation</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121418;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .print-only {
      display: none;
    }
    .athlete-print-doc, .bulk-print-doc {
      display: none;
    }
    @media print {
      #root {
        display: none !important;
      }
      body {
        background-color: white !important;
        color: black !important;
      }
      body.printing-bulk .athlete-print-doc {
        display: none !important;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .memorial-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 20px !important;
        font-family: serif;
      }
      .memorial-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #000 !important;
        background: none !important;
      }
      .memorial-print-title {
        font-size: 24px !important;
        font-weight: bold !important;
        margin-bottom: 20px !important;
        text-align: center !important;
      }
      .memorial-print-badge {
        border: 1px solid black !important;
        padding: 4px 8px !important;
        display: inline-block !important;
        margin: 4px !important;
        border-radius: 16px !important;
        font-size: 14px !important;
      }
      .athlete-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .athlete-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
      .print-header {
        border-bottom: 3px double #000;
        padding-bottom: 12px;
        margin-bottom: 24px;
        text-align: center;
      }
      .print-header h1 {
        font-size: 20px;
        margin: 0;
        text-transform: uppercase;
        font-weight: bold;
      }
      .print-header p {
        font-size: 14px;
        margin: 4px 0 0 0;
        color: #555;
      }
      .print-section {
        margin-bottom: 20px;
      }
      .print-section-title {
        font-size: 14px;
        font-weight: bold;
        border-bottom: 1px solid #000;
        padding-bottom: 4px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .print-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .print-field {
        font-size: 13px;
        line-height: 1.4;
      }
      .print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      .print-table th, .print-table td {
        border: 1px solid #000;
        padding: 8px;
        font-size: 12px;
        text-align: left;
      }
      .print-table th {
        background-color: #f2f2f2 !important;
        font-weight: bold;
      }
      .print-bio-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        align-items: center;
      }
      .print-avatar {
        width: 80px;
        height: 80px;
        border: 1px solid #000;
        object-fit: cover;
      }
      .bulk-print-doc {
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .bulk-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
      .bulk-print-header {
        border-bottom: 3px double #000;
        padding-bottom: 12px;
        margin-bottom: 24px;
        text-align: center;
      }
      .bulk-print-header h1 {
        font-size: 18px;
        margin: 0;
        text-transform: uppercase;
        font-weight: bold;
        line-height: 1.4;
      }
      .bulk-print-header p {
        font-size: 12px;
        margin: 4px 0 0 0;
        color: #555;
      }
      .bulk-print-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      .bulk-print-table th, .bulk-print-table td {
        border: 1px solid #000 !important;
        padding: 6px 8px;
        font-size: 11px;
        text-align: left;
      }
      .bulk-print-table th {
        background-color: #f2f2f2 !important;
        font-weight: bold;
      }
    }
    .warehouse-print-doc {
      display: none;
    }
    @media print {
      .warehouse-print-doc {
        display: block !important;
        background-color: white !important;
        color: black !important;
        padding: 30px !important;
        font-family: "DejaVu Sans", "Sylfaen", "Inter", sans-serif !important;
        box-sizing: border-box !important;
      }
      .warehouse-print-doc * {
        color: black !important;
        text-shadow: none !important;
        border-color: #333 !important;
        background: none !important;
        box-shadow: none !important;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
        max-height: 0;
        overflow: hidden;
      }
      to {
        opacity: 1;
        transform: translateY(0);
        max-height: 1000px;
      }
    }
    .animate-slide-down {
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .profile-dual-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (min-width: 1024px) {
      .profile-dual-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .sidebar-toggle-btn {
      position: absolute;
      top: 24px;
      right: -12px;
      z-index: 100;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: #121418;
      border: 1px solid rgba(34, 211, 238, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.2);
      transition: all 0.2s ease-in-out;
      outline: none;
    }
    .sidebar-toggle-btn:hover {
      border-color: #22d3ee;
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
      transform: scale(1.1);
    }
    .is-fullscreen-map .leaflet-top.leaflet-left {
      top: auto !important;
      bottom: 20px !important;
      left: auto !important;
      right: 20px !important;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load Components Inline to Avoid CORS Error with file:// -->
  <script type="text/babel">
    const BrandSearchIcon = ({ isFocused, className, style, size = 16 }) => {
      const [filterId] = React.useState(() => "neon-glow-" + Math.random().toString(36).substr(2, 9));
      const width = size;
      const height = size;

      return (
        <svg 
          className={className}
          style={{ width: `${width}px`, height: `${height}px`, display: "inline-block", verticalAlign: "middle", ...style }}
          viewBox="0 0 24 24"
        >
          <defs>
            <filter id={`${filterId}-focus`} x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <filter id={`${filterId}-blur`} x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <circle cx="5" cy="5" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />
          <circle cx="12" cy="5" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />
          <circle cx="19" cy="5" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />

          <circle cx="5" cy="12" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />
          <circle cx="19" cy="12" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />

          <circle cx="5" cy="19" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />
          <circle cx="12" cy="19" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />
          <circle cx="19" cy="19" r="2" fill={isFocused ? "#ffffff" : "rgba(255, 255, 255, 0.4)"} style={{ transition: "all 0.2s" }} />

          <circle 
            cx="12" 
            cy="12" 
            r="2" 
            fill="#22d3ee" 
            filter={isFocused ? `url(#${filterId}-focus)` : `url(#${filterId}-blur)`}
            style={{ transition: "all 0.2s" }}
          />
        </svg>
      );
    };

    const PrinterIcon = ({ size = 16, className, style }) => {
      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
          style={style}
        >
          <path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6" />
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
          <rect x="6" y="14" width="12" height="8" rx="1" />
        </svg>
      );
    };

    const defaultPeaks = [
      { id: 1, name: "უშბა", height: 4710, system: "კავკასიონი", continent: "ევროპა", region: "სვანეთი, მესტიის მუნიციპალიტეტი", difficulty: "5B", isBorderZone: true, borderCountries: ["რუსეთი", "საქართველო"], lat: 43.1242, lng: 42.6421, firstAscent: "1888 წელი, ჯონ გარფორდ კოკინი — სამხრეთ მწვერვალი", description: "კავკასიონის ერთ-ერთი ყველაზე რთული მწვერვალი.", photo: "https://via.placeholder.com/150" }
    ];
    const getPersistedPeaks = () => {
      const saved = localStorage.getItem('peaksStore');
      if (saved) {
        try { return JSON.parse(saved); } catch(e){}
      }
      return defaultPeaks;
    };

    const menuItems = [
      // 570 Tab items
      {
        id: 'dashboard',
        node: '570',
        label: 'Dashboard',
        icon: 'fa-solid fa-chart-line'
      },
      {
        id: 'partnerships',
        node: '570',
        label: 'პარტნიორობა',
        icon: 'fa-solid fa-handshake-angle'
      },
      {
        id: 'warehouse',
        node: '570',
        label: 'საწყობი (Warehouse)',
        icon: 'fa-solid fa-box'
      },
      {
        id: 'medianews',
        node: '570',
        label: 'მედიანიუსი',
        icon: 'fa-solid fa-photo-film',
        iconStyle: { textShadow: "0 0 8px rgba(34, 211, 238, 0.8)", color: "#22d3ee" }
      },
      {
        id: 'incidents',
        node: '570',
        label: 'ინციდენტი',
        icon: 'fa-solid fa-triangle-exclamation'
      },
      {
        id: 'settings',
        node: '570',
        label: 'ფედერაციის პარამეტრები',
        icon: 'fa-solid fa-gear'
      },

      // 8849 Tab items
      {
        id: 'athletes',
        node: '8849',
        label: 'სპორტსმენი',
        icon: 'fa-solid fa-person-running'
      },
      {
        id: 'memorial',
        node: '8849',
        label: 'ლეგენდარული სპორტსმენები',
        icon: 'fa-solid fa-award'
      },
      {
        id: 'mentors',
        node: '8849',
        label: 'მენტორები',
        icon: 'fa-solid fa-user-graduate'
      },
      {
        id: 'clubs',
        node: '8849',
        label: 'კლუბების რეესტრი',
        icon: 'fa-solid fa-building-flag',
        iconStyle: { textShadow: "0 0 8px rgba(34, 211, 238, 0.8)", color: "#22d3ee" }
      },
      {
        id: 'spaces',
        node: '8849',
        label: 'სავარჯიშო სივრცე',
        icon: 'fa-solid fa-map-location-dot',
        iconStyle: { textShadow: "0 0 8px rgba(34, 211, 238, 0.8)", color: "#22d3ee" }
      },
      {
        id: 'routes',
        node: '8849',
        label: 'მარშრუტის დაგეგმვა',
        icon: 'fa-solid fa-mountain',
        iconStyle: { textShadow: "0 0 8px rgba(34, 211, 238, 0.8)", color: "#22d3ee" }
      },
      {
        id: 'peaks',
        node: '8849',
        label: 'მწვერვალები',
        icon: 'fa-solid fa-mountain-sun',
        iconStyle: { textShadow: "0 0 8px rgba(34, 211, 238, 0.8)", color: "#22d3ee" }
      }
    ];

    const getViewTab = (view) => {
      const resolvedView = view === 'add_athlete' ? 'athletes' :
                           view === 'add_incident' ? 'incidents' :
                           view === 'add_mentor' ? 'mentors' : view;
      const item = menuItems.find(i => i.id === resolvedView);
      return item ? item.node : '570';
    };

    const Sidebar = ({ currentView, onViewChange, federation }) => {
      const [activeNode, setActiveNode] = React.useState(() => getViewTab(currentView));
      const [isCollapsed, setIsCollapsed] = React.useState(() => {
        return localStorage.getItem('sidebar_collapsed') === 'true';
      });

      React.useEffect(() => {
        const resolvedTab = getViewTab(currentView);
        if (resolvedTab !== activeNode) {
          setActiveNode(resolvedTab);
        }
      }, [currentView]);

      const toggleCollapse = () => {
        setIsCollapsed(prev => {
          const nextVal = !prev;
          localStorage.setItem('sidebar_collapsed', String(nextVal));
          return nextVal;
        });
      };

      const containerStyle = {
        position: "relative",
        width: isCollapsed ? "80px" : "250px",
        backgroundColor: "#121418",
        borderRight: "1px solid rgba(34, 211, 238, 0.2)",
        padding: isCollapsed ? "20px 10px" : "20px",
        display: "flex",
        flexDirection: "column",
        gap: "20px",
        boxSizing: "border-box",
        flexShrink: 0,
        transition: "width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s cubic-bezier(0.4, 0, 0.2, 1)"
      };

      const identityBlockStyle = {
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        gap: isCollapsed ? "0px" : "12px",
        marginBottom: "10px",
        paddingBottom: isCollapsed ? "10px" : "20px",
        borderBottom: "1px solid rgba(34, 211, 238, 0.2)",
        flexShrink: 0,
        transition: "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)"
      };

      const logoStyle = {
        width: isCollapsed ? "40px" : "72px",
        height: isCollapsed ? "40px" : "72px",
        borderRadius: "50%",
        objectFit: "cover",
        border: "2px solid rgba(34, 211, 238, 0.5)",
        backgroundColor: "#F8FAFC",
        transition: "width 0.3s ease, height 0.3s ease"
      };

      const federationNameStyle = {
        display: isCollapsed ? "none" : "block",
        color: "#F8FAFC",
        fontFamily: "'FiraGO', 'Lato', 'Poppins', sans-serif",
        fontWeight: "700",
        fontSize: "14px",
        textAlign: "center",
        lineHeight: "1.4"
      };

      const FEDERATIONS = {
        mountaineering: { name: "საქართველოს მთასვლელთა გაერთიანებული ფედერაცია", logo: "../logo.jpg" },
        judo: { name: "საქართველოს ძიუდოს ფედერაცია", logo: "../logo.jpg" },
        rugby: { name: "საქართველოს რაგბის კავშირი", logo: "../logo.jpg" }
      };
      
      const fedInfo = FEDERATIONS[federation] || { name: "საქართველოს მთასვლელთა გაერთიანებული ფედერაცია", logo: "../logo.jpg" };

      const toggleContainerStyle = {
        display: "flex",
        flexDirection: isCollapsed ? "column" : "row",
        width: "100%",
        backgroundColor: "#121418",
        border: "1px solid rgba(34, 211, 238, 0.2)",
        borderRadius: "8px",
        overflow: "hidden",
        flexShrink: 0,
        gap: isCollapsed ? "4px" : "0px",
        padding: isCollapsed ? "4px" : "0px"
      };

      const toggleButtonStyle = (node) => ({
        flex: 1,
        padding: isCollapsed ? "6px 0" : "10px 0",
        backgroundColor: "transparent",
        color: activeNode === node ? "#22d3ee" : "#475569",
        border: "none",
        borderBottom: (!isCollapsed && activeNode === node) ? "2px solid #22d3ee" : "2px solid transparent",
        textShadow: activeNode === node ? "0 0 10px rgba(34, 211, 238, 0.5)" : "none",
        fontFamily: "'FiraGO', 'Poppins', sans-serif",
        fontWeight: "700",
        fontSize: isCollapsed ? "12px" : "16px",
        cursor: "pointer",
        transition: "all 0.3s ease",
        borderRadius: isCollapsed ? "4px" : "0px"
      });

      const isViewActive = (itemId) => {
        if (currentView === itemId) return true;
        if (itemId === 'athletes' && currentView === 'add_athlete') return true;
        if (itemId === 'incidents' && currentView === 'add_incident') return true;
        if (itemId === 'mentors' && currentView === 'add_mentor') return true;
        return false;
      };

      const buttonStyle = (view) => {
        const isActive = isViewActive(view);
        return {
          backgroundColor: isActive ? "rgba(34, 211, 238, 0.1)" : "transparent",
          color: isActive ? "#ffffff" : "#22d3ee",
          border: isActive ? "1px solid rgba(34, 211, 238, 0.8)" : "1px solid rgba(34, 211, 238, 0.2)",
          padding: isCollapsed ? "12px 0px" : "12px",
          borderRadius: "8px",
          cursor: "pointer",
          boxShadow: isActive ? "0 0 12px rgba(34, 211, 238, 0.5)" : "0 0 10px rgba(34, 211, 238, 0.1)",
          transition: "all 0.3s ease",
          textAlign: isCollapsed ? "center" : "left",
          display: "flex",
          alignItems: "center",
          justifyContent: isCollapsed ? "center" : "flex-start",
          gap: isCollapsed ? "0px" : "10px"
        };
      };

      const navListStyle = {
        display: "flex",
        flexDirection: "column",
        gap: "20px",
        animation: "fadeIn 0.2s ease-in-out",
        overflowY: "auto",
        flex: 1,
        paddingRight: "5px"
      };

      return (
        <div style={containerStyle}>
          <button 
            className="sidebar-toggle-btn" 
            onClick={toggleCollapse} 
            title={isCollapsed ? "გაშლა" : "შეკეცვა"}
          >
            <i className={`fa-solid ${isCollapsed ? 'fa-chevron-right' : 'fa-chevron-left'}`}></i>
          </button>

          <div style={identityBlockStyle}>
            <img src={fedInfo.logo} alt="Federation Logo" style={logoStyle} />
            <div style={federationNameStyle}>{fedInfo.name}</div>
          </div>

          <div style={toggleContainerStyle}>
            <button 
              style={toggleButtonStyle('570')} 
              onClick={() => { 
                setActiveNode('570'); 
                if (getViewTab(currentView) !== '570') {
                  onViewChange('dashboard'); 
                }
              }}
            >
              570
            </button>
            <button 
              style={toggleButtonStyle('8849')} 
              onClick={() => { 
                setActiveNode('8849'); 
                if (getViewTab(currentView) !== '8849') {
                  onViewChange('athletes'); 
                }
              }}
            >
              8849
            </button>
          </div>

          <div key={activeNode} style={navListStyle}>
            {menuItems
              .filter(item => item.node === activeNode)
              .map(item => (
                <button
                  key={item.id}
                  style={buttonStyle(item.id)}
                  onClick={() => onViewChange(item.id)}
                  title={item.label}
                >
                  <i className={item.icon} style={item.iconStyle}></i>
                  <span style={{ display: isCollapsed ? "none" : "inline" }}> {item.label}</span>
                </button>
              ))
            }
          </div>
        </div>
      );
    };

    const UserHeaderWidget = ({ onLogout }) => {

                setStats(prev => ({ ...prev, activeMentors: data.count }));
                return;
              }
            }
            const allRes = await fetch('/api/mentors');

              const data = await allRes.json();

                : 0;
              setStats(prev => ({ ...prev, activeMentors: count }));
            } else {
              throw new Error("Failed to fetch mentors API");
            }
          } catch (e) {
            console.warn("Active Mentors fetch failed, trying fallback:", e);
            try {
              const stored = localStorage.getItem('mentorsStore');
              if (stored) {
                const parsed = JSON.parse(stored);
                const count = Array.isArray(parsed)
                  ? parsed.filter(m => ['მწვრთნელი', 'ინსტრუქტორი', 'ტრენერი', 'აქტიური'].includes(m.status)).length
                  : 0;
                setStats(prev => ({ ...prev, activeMentors: count }));
              } else {
                setStats(prev => ({ ...prev, activeMentors: 0 }));
              }
            } catch (err) {
              setStats(prev => ({ ...prev, activeMentors: '-' }));
            }
          } finally {
            setLoading(prev => ({ ...prev, activeMentors: false }));
          }
        };

        const fetchWarehouseStats = async () => {
          let warehouseData = null;
          let summaryData = null;

          try {
            const res = await fetch('/api/warehouse/stats');
            if (res.ok) {
              warehouseData = await res.json();
            }
          } catch (e) {
            console.warn("Warehouse stats API failed, will try summary:", e);
          }

          try {
            const res = await fetch('/api/v1/dashboard/summary');
            if (res.ok) {
              summaryData = await res.json();
            }
          } catch (e) {
            console.warn("Dashboard summary API failed, will try localStorage:", e);
          }

          try {
            if (warehouseData && typeof warehouseData.issued_count !== 'undefined') {
              setStats(prev => ({ ...prev, issuedInventory: warehouseData.issued_count }));
            } else if (summaryData && summaryData.warehouse_pulse) {
              setStats(prev => ({ ...prev, issuedInventory: summaryData.warehouse_pulse.active_gear_outside || 0 }));
            } else {
              throw new Error("No warehouse inventory data from APIs");
            }
          } catch (e) {
            try {
              const storedTx = localStorage.getItem('warehouse_transactions');
              if (storedTx) {
                const txs = JSON.parse(storedTx);
                const count = txs.filter(t => t.status === 'issued').reduce((acc, t) => acc + (Number(t.qty) || 0), 0);
                setStats(prev => ({ ...prev, issuedInventory: count }));
              } else {
                setStats(prev => ({ ...prev, issuedInventory: 0 }));
              }
            } catch (err) {
              setStats(prev => ({ ...prev, issuedInventory: '-' }));
            }
          } finally {
            setLoading(prev => ({ ...prev, issuedInventory: false }));
          }

          try {
            if (warehouseData && typeof warehouseData.returnable_count !== 'undefined') {
              setStats(prev => ({ ...prev, returnableInventory: warehouseData.returnable_count }));
            } else if (summaryData && summaryData.warehouse_pulse) {
              setStats(prev => ({ ...prev, returnableInventory: summaryData.warehouse_pulse.overdue_count || 0 }));
            } else {
              throw new Error("No returnable inventory data from APIs");
            }
          } catch (e) {
            try {
              const storedTx = localStorage.getItem('warehouse_transactions');
              if (storedTx) {
                const txs = JSON.parse(storedTx);
                const today = new Date('2026-05-24');
                const count = txs.filter(t => {
                  if (t.status !== 'issued' || !t.expectedReturnDate) return false;
                  const retDate = new Date(t.expectedReturnDate);
                  return retDate < today;
                }).length;
                setStats(prev => ({ ...prev, returnableInventory: count }));
              } else {
                setStats(prev => ({ ...prev, returnableInventory: 0 }));
              }
            } catch (err) {
              setStats(prev => ({ ...prev, returnableInventory: '-' }));
            }

            setLoading(prev => ({ ...prev, returnableInventory: false }));

                return;

                  : 0;
                setStats(prev => ({ ...prev, activePartners: partners + sponsors }));
                return;
              }
            }
            throw new Error("Partners APIs failed");
          } catch (e) {
            console.warn("Active Partners fetch failed, trying fallback:", e);

              const stored = localStorage.getItem('federation_partnerships');
              if (stored) {
                const parsed = JSON.parse(stored);
                const count = Array.isArray(parsed)

                setStats(prev => ({ ...prev, activePartners: count }));
              } else {
                setStats(prev => ({ ...prev, activePartners: 0 }));
              }

              setStats(prev => ({ ...prev, activePartners: '-' }));
            }

            setLoading(prev => ({ ...prev, activePartners: false }));

        const fetchMembershipStatus = async () => {
          try {
            const res = await fetch('/api/membership/stats');

              const data = await res.json();

                setStats(prev => ({ ...prev, membershipStatus: data.percentage }));
                return;
              }
            }
            throw new Error("Membership API failed");
          } catch (e) {
            console.warn("Membership Status API failed, calculating locally:", e);
            try {
              const saved = localStorage.getItem('athletesStore');
              if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length > 0) {
                  const fedMembers = parsed.filter(a => a.isFederationMember);
                  const total = fedMembers.length;
                  const paid = fedMembers.filter(a => a.membershipFeePaid).length;
                  const pct = total > 0 ? Math.round((paid / total) * 100) : 0;
                  setStats(prev => ({ ...prev, membershipStatus: `${pct}%` }));
                } else {
                  setStats(prev => ({ ...prev, membershipStatus: '0%' }));
                }
              } else {
                setStats(prev => ({ ...prev, membershipStatus: '0%' }));
              }
            } catch (err) {
              setStats(prev => ({ ...prev, membershipStatus: '-' }));
            }
          } finally {
            setLoading(prev => ({ ...prev, membershipStatus: false }));
          }

        const fetchAthletesCount = async () => {

            const res = await fetch('/api/athletes/count?status=active');

              const data = await res.json();

                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                  const count = parsed.filter(a => a.status === 'აქტიური').length;
                  setStats(prev => ({ ...prev, athletesCount: count }));
                } else {
                  setStats(prev => ({ ...prev, athletesCount: 0 }));
                }

              }

              setStats(prev => ({ ...prev, athletesCount: '-' }));
            }
          } finally {
            setLoading(prev => ({ ...prev, athletesCount: false }));
          }
        };

          try {

                setStats(prev => ({ ...prev, activeIncidents: summaryData.warehouse_pulse.recent_incidents || 0 }));

            console.warn("Active Incidents API failed, using incidents prop:", e);

              const count = incidents.filter(i => i.status !== 'დასრულებული').length;

            } catch (err) {
              setStats(prev => ({ ...prev, activeIncidents: '-' }));
            }
          } finally {
            setLoading(prev => ({ ...prev, activeIncidents: false }));
          }
        };

        fetchMentors();
        fetchWarehouseStats();
        fetchActivePartners();
        fetchMembershipStatus();
        fetchAthletesCount();
        fetchActiveIncidents();

    };

    const getFlagEmoji = (countryCode) => {
      if (!countryCode) return '';
      const codePoints = countryCode
        .toUpperCase()
        .split('')
        .map(char => 127397 + char.charCodeAt(0));
      try {
        return String.fromCodePoint(...codePoints);
      } catch (e) {
        return '';
      }
    };

    const getCountryName = (countryCode) => {
      if (!countryCode) return '';
      if (typeof COUNTRIES === 'undefined') return countryCode;
      const country = COUNTRIES.find(c => c.code.toUpperCase() === countryCode.toUpperCase());
      if (!country) return countryCode;
      return country.name.split('(')[0].trim();
    };

    const calculateAge = (birthDateStr) => {
      if (!birthDateStr) return '';
      const today = new Date();
      const birthDate = new Date(birthDateStr);
      let age = today.getFullYear() - birthDate.getFullYear();
      const m = today.getMonth() - birthDate.getMonth();
      return age;
    };

    const checkAndApplyRankUp = (athlete, oldReferral, newReferral) => {
      const oldVal = Number(oldReferral || 0);
      const newVal = Number(newReferral || 0);
      if (newVal <= oldVal) return athlete.achievements || [];
      
      const ranks = ranksStoreData.getState().ranks || [];
      const activeRanks = ranks
        .filter(r => r.status === 'აქტიური' && r.name && r.requiredPoints !== undefined)
        .sort((a, b) => Number(a.requiredPoints) - Number(b.requiredPoints));
      
      let newAchievements = athlete.achievements ? [...athlete.achievements] : [];
      const geoMonths = ['იანვარი', 'თებერვალი', 'მარტი', 'აპრილი', 'მაისი', 'ივნისი', 'ივლისი', 'აგვისტო', 'სექტემბერი', 'ოქტომბერი', 'ნოემბერი', 'დეკემბერი'];
      const now = new Date();
      const currentDateStr = `${now.getDate()} ${geoMonths[now.getMonth()]}`;
      
      activeRanks.forEach(rank => {
        const req = Number(rank.requiredPoints);
        if (oldVal < req && newVal >= req) {
          const alreadyExists = newAchievements.some(ach => 
            ach.type === 'rank_up' && (ach.title?.includes(rank.name) || ach.peak?.includes(rank.name))
          );
          if (!alreadyExists) {
            const rankUpEvent = {
              id: generateUUID(),
              year: now.getFullYear(),
              date: currentDateStr,
              type: 'rank_up',
              title: `მიენიჭა "${rank.name}"`,
              peak: `მიენიჭა "${rank.name}"`,
              achievement: `სტატუსი: მიენიჭა "${rank.name}"-ის წოდება. საფუძველი: დაგროვილი ${newVal} ქულა (მოთხოვნილი: ${req})`,
              result: `სტატუსი: მიენიჭა "${rank.name}"-ის წოდება. საფუძველი: დაგროვილი ${newVal} ქულა (მოთხოვნილი: ${req})`,
              route: ''
            };
            newAchievements.push(rankUpEvent);
          }
        }
      });
      return newAchievements;
    };

        } else if (newAct.type === 'rank_up') {
          const actualRank = newAct.rankName || (activeRanks[0]?.name || '');

          // Format date from YYYY-MM-DD to DD/MM/YYYY

          if (parts.length === 3) {
            dateVal = `${parts[2]}/${parts[1]}/${parts[0]}`;

        const today = new Date();
        const birthDate = new Date(birthDateStr);
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }
        return age;
      }, []);

        if (filters.discipline !== 'all') count++;
        if (filters.roles.isFounder) count++;
        if (filters.roles.hasVotingRight) count++;
        if (filters.roles.isNationalTeamMember) count++;
        if (filters.roles.isMentorOrVeteran) count++;
        if (filters.bloodType !== 'all') count++;
        if (filters.asthma !== 'all') count++;
        if (filters.diabetes !== 'all') count++;
        if (filters.allergy !== 'all') count++;
        if (filters.countryCode !== 'all') count++;
        if (filters.minAge !== '') count++;
        if (filters.maxAge !== '') count++;
        return count;

      const filteredAthletes = React.useMemo(() => {
        return athletes.filter(athlete => {
          if (searchQuery.trim()) {
            const q = searchQuery.toLowerCase();

            const personalId = (athlete.personalId || '').toLowerCase();
            const phone = (athlete.phone || '').toLowerCase();
            const email = (athlete.email || '').toLowerCase();
            if (!fullName.includes(q) && !personalId.includes(q) && !phone.includes(q) && !email.includes(q)) {
              return false;
            }
          }

          if (filters.status !== 'all') {
            if (filters.status === 'active') {
              if (!athlete.isFederationMember || athlete.membershipStatus !== 'Active') return false;
            } else if (filters.status === 'suspended') {
              if (!athlete.isFederationMember || athlete.membershipStatus !== 'Suspended') return false;
            } else if (filters.status === 'inactive') {
              const isActiveOrSuspended = athlete.isFederationMember && (athlete.membershipStatus === 'Active' || athlete.membershipStatus === 'Suspended');
              if (isActiveOrSuspended) return false;
            }
          }

          if (filters.feePaid !== 'all') {
            const paid = athlete.membershipFeePaid === true;
            if (filters.feePaid === 'paid' && !paid) return false;
            if (filters.feePaid === 'unpaid' && paid) return false;
          }

          if (filters.clubId !== 'all') {
            if (filters.clubId === 'none') {
              if (athlete.isClubMember && athlete.clubId) return false;
            } else {
              if (String(athlete.clubId) !== String(filters.clubId)) return false;
            }
          }

          if (filters.discipline !== 'all') {
            if (athlete.sportsDiscipline !== filters.discipline) return false;
          }

          if (filters.roles.isFounder && !athlete.isFounder) return false;
          if (filters.roles.hasVotingRight && !athlete.hasVotingRight) return false;
          if (filters.roles.isNationalTeamMember && !athlete.isNationalTeamMember) return false;
          if (filters.roles.isMentorOrVeteran && !(athlete.isMentor || athlete.isVeteran)) return false;

          if (filters.bloodType !== 'all') {
            if (athlete.bloodType !== filters.bloodType) return false;
          }

          if (filters.asthma !== 'all') {
            const hasAsthma = athlete.asthma === true;
            if (filters.asthma === 'yes' && !hasAsthma) return false;
            if (filters.asthma === 'no' && hasAsthma) return false;
          }

          if (filters.diabetes !== 'all') {
            const hasDiabetes = athlete.diabetes === true;
            if (filters.diabetes === 'yes' && !hasDiabetes) return false;
            if (filters.diabetes === 'no' && hasDiabetes) return false;
          }

          if (filters.allergy !== 'all') {
            const hasAllergy = athlete.allergies && athlete.allergies !== "არ აქვს" && athlete.allergies.trim() !== "";
            if (filters.allergy === 'yes' && !hasAllergy) return false;
            if (filters.allergy === 'no' && hasAllergy) return false;
          }

          if (filters.countryCode !== 'all') {
            if (athlete.nationality !== filters.countryCode) return false;
          }

          if (filters.minAge !== '' || filters.maxAge !== '') {
            if (athlete.birthDate) {
              const age = calculateAge(athlete.birthDate);
              if (age !== '') {
                if (filters.minAge !== '' && age < parseInt(filters.minAge)) return false;
                if (filters.maxAge !== '' && age > parseInt(filters.maxAge)) return false;
              } else {
                return false;
              }
            } else {
              return false;
            }
          }

          return true;
        });

        setIsCameraOpen(true);

          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
          }
        } catch (err) {
          console.error("Error accessing camera:", err);
          setError("კამერაზე წვდომა ვერ მოხერხდა.");
          setIsCameraOpen(false);
        }
      };

        if (videoRef.current && canvasRef.current) {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg');
          updateData('photoPreview', dataUrl);
          stopCamera();
        }
      };

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {

        return p * q * rate;

        return itemsList.reduce((sum, item) => sum + getGELValue(item.price, item.qtyTotal, item.currency), 0);

        const expiryDate = new Date(expiry);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        expiryDate.setHours(0, 0, 0, 0);
        return expiryDate < today;

      // Math valuation calculations

      const writtenOffItems = React.useMemo(() => {

              list.push({

              });
            } else {
              // Bundle

              if (bundleObj) {
                bundleObj.items.forEach(comp => {
                  const itemObj = items.find(i => i.id === comp.itemId);

athleteName: t.athleteName || ''

        // 2. Add from items whose status is 'დაზიანებული', 'დაკარგული', or 'ჩამოწერილი'

              const unitPrice = getGELValue(item.price, 1, item.currency);

              list.push({
                id: `item-${item.id}`,

      const writtenOffTotalGEL = React.useMemo(() => {

      // Pre-Print Filtering Helper Functions & Memoized lists

        if (filterValue === 'ცვეთა') {
          return text.includes('ცვეთა') || text.includes('ამორტიზაცია') || text.includes('ვადაგასული');
        }
        if (filterValue === 'დაზიანება/ინციდენტი') {
          return text.includes('დაზიანება') || text.includes('დაზიანდა') || text.includes('ინციდენტი') || text.includes('გატეხილი') || text.includes('გატყდა') || text.includes('დაზიანებული');
        }
        if (filterValue === 'დაკარგვა') {

      const prePrintFilteredInflows = React.useMemo(() => {

      const prePrintFilteredDisposals = React.useMemo(() => {

          const matchesStart = !prePrintStartDate || itemDatePart >= prePrintStartDate;
          const matchesEnd = !prePrintEndDate || itemDatePart <= prePrintEndDate;
          const matchesCat = prePrintCategory === 'all' || item.category === prePrintCategory;
          const matchesAthlete = !prePrintAthlete || item.athleteId === prePrintAthlete.id;
          const matchesReason = matchesWriteOffReason(item.reason, prePrintReason);
          return matchesStart && matchesEnd && matchesCat && matchesAthlete && matchesReason;

      }, [writtenOffItems, prePrintStartDate, prePrintEndDate, prePrintCategory, prePrintAthlete, prePrintReason, matchesWriteOffReason]);

const liveGridData = React.useMemo(() => {

        return matchesSearch && matchesCategory && matchesStatus;

      const unifiedRegistryList = React.useMemo(() => {

        const matchesSearch = (b) => {

        const matchesStatus = (b) => {
          if (selectedStatus === 'all') return true;
          const activeTrans = transactions.filter(t => t.itemId === b.id && t.status === 'issued');
          if (selectedStatus === 'ვარგისი') return true;

          }

          let statusColor = "#10b981";

            hasOverdue,
            statusText,
            statusColor,
            statusBg,
            itemObj: bundle,
            isBundle: true,
            actionsAvailable: !componentsLowStock
          };

        return [...mappedItems, ...mappedBundles];
      }, [filteredItems, bundles, transactions, items, searchQuery, selectedCategory, selectedStatus]);

          if (isBundleHighRisk) return true;

      const isUnqualified = React.useMemo(() => {

          alert('გთხოვთ აირჩიოთ პასუხისმგებელი პირი (სპორტსმენი)!');

          alert('შეცდომა: ამ სპორტსმენს ადევს აქტიური ბლოკი და ნივთებს ვერ მიიღებს!');
          return;
        }
        if (isHighRiskGear && isUnqualified) {

alert('შეცდომა: ამ სპორტსმენს არ აქვს საკმარისი კვალიფიკაცია მაღალი რისკის აღჭურვილობის მისაღებად!');

itemName: bundle.name,

                  name: file.name.split('.').slice(0, -1).join('.') || file.name,
                  type: "image",
                  url: url,
                  album: selectedAlbum,
                  tags: ""

              თამბნეილი: ${details.thumbnailName}

                        padding: "2px 8px",
                        borderRadius: "6px",
                        fontSize: "10px"
                      }}>
                        {newsData.status === 'Draft' ? 'დრაფტი' :
                         newsData.status === 'Scheduled' ? 'დაგეგმილი' : 'გამოქვეყნებული'}
                      </span>
                    </div>

                    <div style={{ padding: "15px", display: "flex", flexDirection: "column", gap: "8px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "11px", color: "rgba(255,255,255,0.4)" }}>
                        <i className="fa-regular fa-calendar"></i>
                        <span>
                          {newsData.status === 'Scheduled' && newsData.publish_at ? (
                            <span>გამოქვეყნება: {newsData.publish_at.replace('T', ' ')}</span>
                          ) : (
                            <span>დღეს (2026-05-24)</span>
                          )}
                        </span>
                      </div>

                      <h4 style={{
                        margin: 0,
                        fontSize: "16px",
                        color: "#fff",
                        fontWeight: "bold",
                        lineHeight: "1.3",

                        {newsData.title || "საჩვენებელი სათაური"}

    const ManagementDashboard = ({ athletes }) => {
      const [Component, setComponent] = React.useState(null);
      const [error, setError] = React.useState(null);

      React.useEffect(() => {
        const files = [
          { name: 'StaffRegistry', path: 'src/components/management/StaffRegistry.tsx' },
          { name: 'FoundersRegistry', path: 'src/components/management/FoundersRegistry.tsx' },
          { name: 'RegisteredStatusRegistry', path: 'src/components/management/RegisteredStatusRegistry.tsx' },
          { name: 'ManagementHub', path: 'src/components/management/ManagementHub.tsx' }
        ];

        const loadNext = async (index) => {
          if (index >= files.length) {
            if (window.ManagementHub) {
              setComponent(() => window.ManagementHub);
            } else {
              setError("ManagementHub component not registered on window!");
            }
            return;
          }

          const file = files[index];
          try {
            const res = await fetch(file.path + '?t=' + Date.now());
            if (!res.ok) throw new Error("ფაილის წაკითხვა ვერ მოხერხდა: " + file.name);
            let code = await res.text();
            
            // Strip imports and compile typescript React syntax
            code = code.replace(/import\s+.*\s+from\s+['"].*['"];?/g, '');
            
            if (file.name === 'ManagementHub') {
              code = `
                const StaffRegistry = window.StaffRegistry;
                const FoundersRegistry = window.FoundersRegistry;
                const { RegisteredStatusRegistry } = window;
                ${code}
              `;
              code = code.replace(/export\s+const\s+ManagementHub\s*=/g, 'window.ManagementHub =');
            } else if (file.name === 'RegisteredStatusRegistry') {
              code = code.replace(/export\s+const\s+RegisteredStatusRegistry\s*=/g, 'window.RegisteredStatusRegistry =');
            } else if (file.name === 'StaffRegistry') {
              code = code.replace(/export\s+const\s+StaffRegistry\s*=/g, 'window.StaffRegistry =');
            } else if (file.name === 'FoundersRegistry') {
              code = code.replace(/export\s+const\s+FoundersRegistry\s*=/g, 'window.FoundersRegistry =');
            }

            const compiled = Babel.transform(code, {
              presets: ['react', 'typescript'],
              filename: file.name + '.tsx'
            }).code;

            const runnable = compiled.replace(/export\s*\{\s*\}?;?/g, '');
            eval(runnable);

            loadNext(index + 1);
          } catch (err) {
            console.error(err);
            setError(err.message);
          }
        };

        loadNext(0);
      }, []);

      if (error) return <div style={{ color: '#ef4444', padding: '20px' }}>შეცდომა ჩატვირთვისას: {error}</div>;
      if (!Component) return <div style={{ color: '#fff', padding: '20px' }}>იკვირთება კომპონენტი...</div>;
      return <Component athletes={athletes} />;
    };

    const MultiSelectDropdown = ({ value = [], onChange, options = [], placeholder, style }) => {
      const [isOpen, setIsOpen] = React.useState(false);
      const containerRef = React.useRef(null);

      React.useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const toggleOption = (optVal) => {
        const newValue = value.includes(optVal)
          ? value.filter(v => v !== optVal)
          : [...value, optVal];
        onChange(newValue);
      };

      return (
        <div ref={containerRef} style={{ position: 'relative', width: '100%', zIndex: 9999 }}>
          <div
            onClick={() => setIsOpen(!isOpen)}
            style={{
              ...style,
              cursor: 'pointer',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              userSelect: 'none',
              minHeight: '38px',
              flexWrap: 'wrap',
              gap: '4px',
              padding: '6px 10px'

            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
              {value.length === 0 ? (
                <span style={{ color: 'rgba(255,255,255,0.4)' }}>{placeholder}</span>

                value.map(val => (
                  <span
                    key={val}
                    style={{
                      backgroundColor: 'rgba(34, 211, 238, 0.15)',
                      border: '1px solid rgba(34, 211, 238, 0.3)',
                      color: '#22d3ee',
                      padding: '2px 6px',
                      borderRadius: '4px',
                      fontSize: '11px',
                      display: 'flex',
                      alignItems: 'center',
                      gap: '4px'
                    }}
                    onClick={(e) => {
                      e.stopPropagation();
                      toggleOption(val);
                    }}
                  >
                    {val}
                    <i className="fa-solid fa-xmark" style={{ fontSize: '9px', cursor: 'pointer' }}></i>
                  </span>
                ))
              )}
            </div>
            <i className={`fa-solid fa-chevron-${isOpen ? 'up' : 'down'}`} style={{ fontSize: '11px', opacity: 0.7 }}></i>
          </div>
          {isOpen && (
            <div style={{
              position: 'absolute',
              top: '100%',

              backgroundColor: '#1b1f24',

              maxHeight: '200px',
              overflowY: 'auto',

            }}>
              {options.map(opt => {
                const isSelected = value.includes(opt);
                return (
                  <div
                    key={opt}
                    onClick={() => toggleOption(opt)}
                    style={{
                      padding: '10px 12px',
                      cursor: 'pointer',
                      fontSize: '12px',
                      color: isSelected ? '#22d3ee' : '#cbd5e1',
                      backgroundColor: isSelected ? 'rgba(34, 211, 238, 0.08)' : 'transparent',
                      display: 'flex',
                      alignItems: 'center',
                      justifyContent: 'space-between',

                    }}
                    onMouseEnter={e => {
                      if (!isSelected) e.currentTarget.style.backgroundColor = 'rgba(255,255,255,0.03)';
                    }}
                    onMouseLeave={e => {
                      if (!isSelected) e.currentTarget.style.backgroundColor = 'transparent';
                    }}
                  >
                    <span>{opt}</span>
                    {isSelected && <i className="fa-solid fa-check" style={{ fontSize: '10px' }}></i>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );

      const handleSubmit = async () => {
        // Validation
        if (!formData.status) {
          alert('გთხოვთ აირჩიოთ სტატუსი!');
          return;
        }
        if (!formData.firstName || !formData.lastName) {
          alert('გთხოვთ შეავსოთ სახელი და გვარი!');
          return;
        }
        if (!formData.personalId || formData.personalId.length !== 11) {
          alert('პირადი ნომერი უნდა შედგებოდეს 11 ციფრისგან!');
          return;
        }
        
        // Validate phone number against regex /^\+?[0-9]{9,15}$/
        const phoneRegex = /^\+?[0-9]{9,15}$/;
        if (formData.phone && !phoneRegex.test(formData.phone)) {
          alert('ტელეფონის ნომრის ფორმატი არასწორია (უნდა შეიცავდეს 9-15 ციფრს)!');
          return;
        }

        const payload = {
          ...formData,
          id: 'M-' + Date.now()
        };

        try {
          const response = await fetch('/api/mentors', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            throw new Error('API request failed');
          }
          
          const result = await response.json();
          if (result.success) {
            console.log('Mentor saved successfully on backend:', result);
          } else {
            throw new Error(result.error || 'Unknown backend error');
          }
        } catch (error) {
          console.warn('API submission failed, backing up to local storage:', error);
          
          // Fallback: Save to localStorage mentorsStore
          let existingMentors = [];
          const stored = localStorage.getItem('mentorsStore');
          if (stored) {
            try {
              existingMentors = JSON.parse(stored);
              if (!Array.isArray(existingMentors)) {
                existingMentors = [];
              }
            } catch (e) {
              existingMentors = [];
            }
          }
          
          const localMentor = {
            id: payload.id,
            firstName: payload.firstName,
            lastName: payload.lastName,
            personalId: payload.personalId,
            status: payload.status,
            sportType: payload.sportTypes.length > 0 ? payload.sportTypes[0] : '',
            sportTypes: payload.sportTypes,
            height: payload.height,
            weight: payload.weight,
            bloodType: payload.bloodType,
            phone: payload.phone,
            email: payload.email,
            category: payload.category,
            photo: payload.photo,
            certificates: payload.certificates,
            awards: payload.awards,
            biography: payload.biography
          };
          
          existingMentors.push(localMentor);
          localStorage.setItem('mentorsStore', JSON.stringify(existingMentors));
        }

        onViewChange('mentors');
      };

      const sectionStyle = {

    const MemorialRegistryDashboard = ({ athletes = [], onUpdateAthlete }) => {
      const [records, setRecords] = React.useState([
        { id: 1, firstName: 'მიხეილ', lastName: 'ხერგიანი', birthYear: 1932, deathYear: 1969, titles: ['სპორტის დამსახურებული ოსტატი', 'საბჭოთა კავშირის ჩემპიონი'], biography: 'ლეგენდარული ქართველი ალპინისტი...', profilePhoto: 'https://i.pravatar.cc/150?img=68', galleryPhotos: [] }
      ]);
      const [searchQuery, setSearchQuery] = React.useState('');
      const [periodStart, setPeriodStart] = React.useState('');
      const [periodEnd, setPeriodEnd] = React.useState('');
      const [titleFilter, setTitleFilter] = React.useState('');
      const [selectedRecord, setSelectedRecord] = React.useState(null);
      const [isFormOpen, setIsFormOpen] = React.useState(false);
      const [formData, setFormData] = React.useState({ firstName: '', lastName: '', birthYear: '', deathYear: '', biography: '', titles: [], profilePhoto: null, galleryPhotos: [] });
      const [newTitle, setNewTitle] = React.useState('');
      const [error, setError] = React.useState('');

      // Fullscreen and editing states
      const [isFullscreenOpen, setIsFullscreenOpen] = React.useState(false);
      const [isEditing, setIsEditing] = React.useState(false);
      const [editForm, setEditForm] = React.useState(null);
      const [newEditTitle, setNewEditTitle] = React.useState('');

      const handleProfilePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setFormData(prev => ({ ...prev, profilePhoto: reader.result }));
          };
          reader.readAsDataURL(file);
        }
      };

      const handleGalleryPhotosChange = (e) => {
        const files = Array.from(e.target.files);
        Promise.all(files.map(file => new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(file);
        }))).then(results => {
          setFormData(prev => ({ ...prev, galleryPhotos: [...prev.galleryPhotos, ...results] }));
        });
      };

      const deceasedAthletes = React.useMemo(() => {
        return athletes
          .filter(a => a.isFederationMember && a.membershipStatus === 'Deceased')
          .map(a => {
            const birthYear = a.birthDate ? (
              /^\d{4}/.test(a.birthDate) 
                ? parseInt(a.birthDate.substring(0, 4)) 
                : new Date(a.birthDate).getFullYear()
            ) : null;
            const deathYear = a.deathYear ? parseInt(a.deathYear) : null;
            const titles = [];
            if (a.isFounder) titles.push('დამფუძნებელი');
            if (a.isNationalTeamMember) titles.push('ეროვნული ნაკრები');
            if (a.isVeteran) titles.push('ვეტერანი ათლეტი');
            if (a.isMentor) titles.push('მენტორი');
            if (a.achievements) {
              a.achievements.forEach(ach => {
                if (ach.result) titles.push(ach.result);
              });
            }
            return {
              id: `dynamic-${a.id}`,
              firstName: a.firstName,
              lastName: a.lastName,
              birthYear,
              deathYear,
              titles,
              biography: a.biography || '',
              profilePhoto: a.photo,
              galleryPhotos: []
            };
          });
      }, [athletes]);

      const combinedRecords = React.useMemo(() => {
        return [...records, ...deceasedAthletes];
      }, [records, deceasedAthletes]);

      const allTitles = Array.from(new Set(combinedRecords.flatMap(r => r.titles)));

      const filteredRecords = combinedRecords.filter(r => {
        const matchesSearch = (r.firstName + ' ' + r.lastName).toLowerCase().includes(searchQuery.toLowerCase());
        const matchesTitle = titleFilter ? r.titles.includes(titleFilter) : true;
        const start = periodStart ? parseInt(periodStart) : 0;
        const end = periodEnd ? parseInt(periodEnd) : 9999;
        const matchesPeriod = r.birthYear >= start && r.deathYear <= end;
        return matchesSearch && matchesTitle && matchesPeriod;
      });

      const handleSave = () => {
        if (!formData.firstName || !formData.lastName || !formData.birthYear || !formData.deathYear) {
          setError('შეავსეთ სავალდებულო ველები');
          return;
        }
        if (parseInt(formData.deathYear) < parseInt(formData.birthYear)) {
          setError('გარდაცვალების წელი არ შეიძლება იყოს დაბადების წელზე ნაკლები');
          return;
        }
        setRecords([...records, { ...formData, id: Date.now() }]);
        setIsFormOpen(false);
        setFormData({ firstName: '', lastName: '', birthYear: '', deathYear: '', biography: '', titles: [], profilePhoto: null, galleryPhotos: [] });
        setError('');
      };

      const handlePrint = () => {
        window.print();
      };

      const handleMinimize = React.useCallback(() => {
        setIsFullscreenOpen(false);
        setIsEditing(false);
        setEditForm(null);
        setError('');
      }, []);

      const handleStartEdit = () => {
        setEditForm({ ...selectedRecord });
        setIsEditing(true);
      };

      const handleCancelEdit = () => {
        setIsEditing(false);
        setEditForm(null);
        setError('');
      };

      const handleSaveEdit = (updatedRecord) => {
        if (!updatedRecord.firstName || !updatedRecord.lastName || !updatedRecord.birthYear || !updatedRecord.deathYear) {
          alert('შეავსეთ სავალდებულო ველები');
          return;
        }
        if (parseInt(updatedRecord.deathYear) < parseInt(updatedRecord.birthYear)) {
          alert('გარდაცვალების წელი არ შეიძლება იყოს დაბადების წელზე ნაკლები');
          return;
        }

        if (String(updatedRecord.id).startsWith('dynamic-')) {
          const originalId = String(updatedRecord.id).replace('dynamic-', '');
          const originalAthlete = athletes.find(ath => String(ath.id) === originalId);
          if (originalAthlete) {
            const updated = {
              ...originalAthlete,
              firstName: updatedRecord.firstName,
              lastName: updatedRecord.lastName,
              biography: updatedRecord.biography,
              photo: updatedRecord.profilePhoto,
              deathYear: String(updatedRecord.deathYear),
              birthDate: (() => {
                if (updatedRecord.birthYear) {
                  const birthYearStr = String(updatedRecord.birthYear);
                  if (originalAthlete.birthDate) {
                    const parts = originalAthlete.birthDate.split('-');
                    if (parts.length === 3) {
                      return `${birthYearStr}-${parts[1]}-${parts[2]}`;
                    }
                  }
                  return `${birthYearStr}-01-01`;
                }
                return originalAthlete.birthDate;
              })(),
              isFounder: updatedRecord.titles.includes('დამფუძნებელი'),
              isNationalTeamMember: updatedRecord.titles.includes('ეროვნული ნაკრები'),
              isVeteran: updatedRecord.titles.includes('ვეტერანი ათლეტი'),
              isMentor: updatedRecord.titles.includes('მენტორი'),
              achievements: updatedRecord.titles
                .filter(t => !['დამფუძნებელი', 'ეროვნული ნაკრები', 'ვეტერანი ათლეტი', 'მენტორი'].includes(t))
                .map((t, idx) => ({ id: `ach-${idx}`, date: '', result: t, description: '' }))
            };
            if (onUpdateAthlete) {
              onUpdateAthlete(updated);
            }
          }
        } else {
          setRecords(prev => prev.map(r => r.id === updatedRecord.id ? updatedRecord : r));
        }
        setSelectedRecord(updatedRecord);
        setIsEditing(false);
        setEditForm(null);
      };

      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            handleMinimize();
          }
        };
        if (isFullscreenOpen) {
          window.addEventListener('keydown', handleKeyDown);
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          document.body.style.overflow = '';
        };
      }, [isFullscreenOpen, handleMinimize]);

      return (
        <div style={{ flex: 1, display: "flex", backgroundColor: "#121418", color: "#e2e8f0", overflow: "hidden" }}>
          
          {/* Print Template (Hidden normally) */}
          <div className="print-only memorial-print-doc" style={{ width: "100%" }}>
            {selectedRecord && (
              <>
                <div style={{ textAlign: "center", marginBottom: "30px", borderBottom: "2px solid black", paddingBottom: "20px" }}>
                  <h1 className="memorial-print-title">ოფიციალური მემორიალური ამონაწერი</h1>
                  {selectedRecord.profilePhoto && (
                    <div style={{ margin: "15px auto", width: "120px", height: "120px", borderRadius: "8px", overflow: "hidden", border: "1px solid black" }}>
                      <img src={selectedRecord.profilePhoto} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="Profile" />
                    </div>
                  )}
                  <h2 style={{ margin: "5px 0" }}>{selectedRecord.firstName} {selectedRecord.lastName}</h2>
                  <div style={{ fontSize: "18px" }}>{selectedRecord.birthYear} - {selectedRecord.deathYear}</div>
                </div>
                <div style={{ marginBottom: "20px" }}>
                  <h3>ტიტულები:</h3>
                  {selectedRecord.titles.map((t, i) => <span key={i} className="memorial-print-badge">{t}</span>)}
                </div>
                <div style={{ marginBottom: "20px" }}>
                  <h3>ბიოგრაფია:</h3>
                  <p style={{ whiteSpace: "pre-wrap", lineHeight: "1.6" }}>{selectedRecord.biography}</p>
                </div>
                {selectedRecord.galleryPhotos && selectedRecord.galleryPhotos.length > 0 && (
                  <div>
                    <h3>ფოტო მასალა:</h3>
                    <div style={{ display: "flex", gap: "10px", flexWrap: "wrap" }}>

                        <div key={idx} style={{ width: "150px", height: "150px", border: "1px solid black", overflow: "hidden", pageBreakInside: "avoid" }}>
                          <img src={photo} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt={`Gallery ${idx}`} />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          <div className="no-print" style={{ flex: 1, padding: "30px", display: "flex", gap: "20px", overflow: "hidden" }}>
            
            {/* Left Panel: Filters & List */}

                <h2 style={{ color: "#d4af37", margin: 0 }}><i className="fa-solid fa-award" style={{ marginRight: "10px" }}></i> ლეგენდარული სპორტსმენები</h2>
                <button onClick={() => { setIsFormOpen(true); setSelectedRecord(null); }} style={{ background: "#d4af37", color: "#121418", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: "bold", cursor: "pointer", display: "flex", alignItems: "center", gap: "8px" }}>
                  <i className="fa-solid fa-plus"></i> დამატება
                </button>
              </div>

              {/* Filters */}
              <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", borderBottom: "1px solid rgba(255,255,255,0.1)", paddingBottom: "15px" }}>

                <input type="number" placeholder="წელი (დან)" value={periodStart} onChange={e => setPeriodStart(e.target.value)} style={{ width: "90px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(212, 175, 55, 0.3)", padding: "8px", borderRadius: "8px", color: "#fff", outline: "none" }} />
                <input type="number" placeholder="წელი (მდე)" value={periodEnd} onChange={e => setPeriodEnd(e.target.value)} style={{ width: "90px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(212, 175, 55, 0.3)", padding: "8px", borderRadius: "8px", color: "#fff", outline: "none" }} />
                <select value={titleFilter} onChange={e => setTitleFilter(e.target.value)} style={{ width: "150px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(212, 175, 55, 0.3)", padding: "8px", borderRadius: "8px", color: "#fff", outline: "none" }}>

                  <div key={r.id} onClick={() => { setSelectedRecord(r); setIsFormOpen(false); setIsFullscreenOpen(true); }} style={{ display: "flex", alignItems: "center", gap: "15px", padding: "15px", borderRadius: "8px", background: selectedRecord?.id === r.id ? "rgba(212, 175, 55, 0.1)" : "rgba(0,0,0,0.2)", border: `1px solid ${selectedRecord?.id === r.id ? '#d4af37' : 'rgba(255,255,255,0.05)'}`, cursor: "pointer", transition: "0.2s" }}>
                    {r.profilePhoto ? (
                      <div style={{ width: "40px", height: "40px", borderRadius: "50%", overflow: "hidden", border: selectedRecord?.id === r.id ? "1.5px solid #d4af37" : "1.5px solid rgba(212, 175, 55, 0.4)" }}>
                        <img src={r.profilePhoto} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="Profile" />
                      </div>

                      <div style={{ width: "40px", height: "40px", borderRadius: "50%", background: "rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center", border: selectedRecord?.id === r.id ? "1.5px solid #d4af37" : "1.5px solid rgba(212, 175, 55, 0.4)" }}>
                        <i className="fa-solid fa-user" style={{ color: selectedRecord?.id === r.id ? "#d4af37" : "rgba(255,255,255,0.3)" }}></i>
                      </div>

                      <div style={{ fontWeight: "bold", fontSize: "16px", color: "#fff" }}>{r.firstName} {r.lastName}</div>
                      <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.5)", marginTop: "4px" }}>{r.birthYear} - {r.deathYear}</div>

                  <i className="fa-solid fa-xmark" style={{ cursor: "pointer", fontSize: "18px" }} onClick={() => setIsFormOpen(false)}></i>
                </div>
                {error && <div style={{ color: "#ef4444", fontSize: "14px", backgroundColor: "rgba(239, 68, 68, 0.1)", padding: "10px", borderRadius: "8px" }}>{error}</div>}

                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>გვარი</label>
                    <input type="text" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} style={{ width: "100%", padding: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", boxSizing: "border-box" }} />
                  </div>
                </div>

                <div style={{ display: "flex", gap: "10px" }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>დაბადების წელი</label>
                    <input type="number" value={formData.birthYear} onChange={e => setFormData({...formData, birthYear: e.target.value})} style={{ width: "100%", padding: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", boxSizing: "border-box" }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>გარდაცვალების წელი</label>
                    <input type="number" value={formData.deathYear} onChange={e => setFormData({...formData, deathYear: e.target.value})} style={{ width: "100%", padding: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", boxSizing: "border-box" }} />
                  </div>
                </div>

                <div>
                  <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>ტიტულები (Dynamic Chips)</label>
                  <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "10px" }}>
                    {formData.titles.map((t, idx) => (
                      <div key={idx} style={{ padding: "4px 8px", background: "rgba(212, 175, 55, 0.1)", border: "1px solid #d4af37", borderRadius: "16px", fontSize: "12px", color: "#d4af37", display: "flex", alignItems: "center", gap: "5px" }}>
                        {t} <i className="fa-solid fa-xmark" style={{ cursor: "pointer" }} onClick={() => setFormData({...formData, titles: formData.titles.filter((_, i) => i !== idx)})}></i>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: "10px" }}>
                    <input type="text" placeholder="მაგ. სპორტის ოსტატი" value={newTitle} onChange={e => setNewTitle(e.target.value)} style={{ flex: 1, padding: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none" }} />
                    <button onClick={() => { if(newTitle) { setFormData({...formData, titles: [...formData.titles, newTitle]}); setNewTitle(''); } }} style={{ background: "transparent", border: "1px solid #d4af37", color: "#d4af37", borderRadius: "8px", padding: "0 15px", cursor: "pointer" }}>+ დამატება</button>
                  </div>
                </div>

                <div style={{ display: "flex", gap: "15px" }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>პროფილის ფოტო</label>
                    <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                      <div style={{ width: "40px", height: "40px", borderRadius: "8px", background: "rgba(255,255,255,0.05)", border: "1px dashed rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", flexShrink: 0 }}>
                        {formData.profilePhoto ? <img src={formData.profilePhoto} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="Profile" /> : <i className="fa-solid fa-user" style={{ color: "rgba(255,255,255,0.3)", fontSize: "14px" }}></i>}
                      </div>
                      <input type="file" accept="image/*" onChange={handleProfilePhotoChange} style={{ flex: 1, padding: "8px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", fontSize: "12px", width: "100%" }} />
                    </div>
                  </div>
                  
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>ფოტო მასალა / გალერეა</label>
                    <input type="file" accept="image/*" multiple onChange={handleGalleryPhotosChange} style={{ width: "100%", padding: "8px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", fontSize: "12px", boxSizing: "border-box" }} />
                  </div>
                </div>

                {formData.galleryPhotos.length > 0 && (
                  <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", padding: "10px", background: "rgba(0,0,0,0.2)", borderRadius: "8px" }}>
                    {formData.galleryPhotos.map((photo, idx) => (
                      <div key={idx} style={{ position: "relative", width: "50px", height: "50px", borderRadius: "8px", overflow: "hidden", border: "1px solid rgba(255,255,255,0.1)" }}>

                        <i className="fa-solid fa-xmark" style={{ position: "absolute", top: "2px", right: "2px", background: "rgba(0,0,0,0.6)", color: "#fff", borderRadius: "50%", padding: "2px", cursor: "pointer", fontSize: "10px" }} onClick={() => setFormData(prev => ({ ...prev, galleryPhotos: prev.galleryPhotos.filter((_, i) => i !== idx) }))}></i>
                      </div>
                    ))}
                  </div>
                )}

                <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                  <label style={{ fontSize: "12px", color: "rgba(255,255,255,0.7)", display: "block", marginBottom: "5px" }}>ისტორიის აღწერა</label>
                  <textarea value={formData.biography} onChange={e => setFormData({...formData, biography: e.target.value})} style={{ flex: 1, width: "100%", padding: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "8px", color: "#fff", outline: "none", resize: "none", boxSizing: "border-box", minHeight: "150px" }}></textarea>
                </div>

                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={handleSave} style={{ background: "#d4af37", color: "#121418", border: "none", padding: "10px 20px", borderRadius: "8px", fontWeight: "bold", cursor: "pointer" }}>შენახვა</button>
                </div>
              </div>
            )}

            {selectedRecord && !isFormOpen && (
              <div style={{ flex: 1, backgroundColor: "rgba(15, 23, 42, 0.6)", borderRadius: "12px", padding: "30px", border: "1px solid rgba(212, 175, 55, 0.15)", overflowY: "auto", display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "20px" }}>
                  <div style={{ display: "flex", gap: "20px", alignItems: "center" }}>
                    {selectedRecord.profilePhoto ? (
                      <div style={{ width: "80px", height: "80px", borderRadius: "50%", overflow: "hidden", border: "3px solid #d4af37", boxShadow: "0 0 15px rgba(212, 175, 55, 0.4)" }}>
                        <img src={selectedRecord.profilePhoto} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="Profile" />
                      </div>
                    ) : (
                      <div style={{ width: "80px", height: "80px", borderRadius: "50%", background: "rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center", border: "3px solid #d4af37", boxShadow: "0 0 15px rgba(212, 175, 55, 0.4)" }}>
                        <i className="fa-solid fa-user" style={{ color: "#d4af37", fontSize: "24px" }}></i>
                      </div>
                    )}
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" }}>
                        <h2 style={{ margin: "0 0 5px 0", color: "#fff", fontSize: "28px" }}>{selectedRecord.firstName} {selectedRecord.lastName}</h2>
                        <span style={{
                          backgroundColor: "rgba(212, 175, 55, 0.1)",
                          border: "1px solid #d4af37",
                          color: "#d4af37",
                          padding: "2px 8px",
                          borderRadius: "6px",
                          fontSize: "11px",
                          fontWeight: "bold"
                        }}>
                          ლეგენდარული სპორტსმენები
                        </span>
                      </div>
                      <div style={{ color: "#d4af37", fontSize: "16px", marginTop: "5px", fontWeight: "bold" }}>ცხოვრების წლები: {selectedRecord.birthYear} - {selectedRecord.deathYear}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: "10px" }}>
                    <button onClick={handlePrint} style={{ background: "transparent", border: "1px solid #d4af37", color: "#d4af37", padding: "8px 16px", borderRadius: "8px", cursor: "pointer", display: "flex", alignItems: "center", gap: "8px", fontSize: "14px", transition: "all 0.3s" }} onMouseOver={e => { e.currentTarget.style.background = "rgba(212, 175, 55, 0.1)"; e.currentTarget.style.boxShadow = "0 0 10px rgba(212, 175, 55, 0.3)"; }} onMouseOut={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.boxShadow = "none"; }}>
                      <i className="fa-solid fa-print"></i> ამობეჭდვა / PDF

                    </button>
                  </div>
                </div>

                <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "30px" }}>

                  <p style={{ color: "#e2e8f0", lineHeight: "1.8", whiteSpace: "pre-wrap" }}>
                    {selectedRecord.biography}
